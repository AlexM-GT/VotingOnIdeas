services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: votingonideas-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "sa_P@ssword_1"
    ports:
      - "${SQL_HOST_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: votingonideas-backend
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=VotingOnIdeasDb;User Id=sa;Password=sa_P@ssword_1;TrustServerCertificate=True;Encrypt=False;"
      Jwt__Secret: "dev-secret-change-this-to-at-least-32-chars!!"
      Cors__AllowedOrigins__0: "http://localhost:${FRONTEND_HOST_PORT:-3000}"
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:${BACKEND_HOST_PORT:-8080}/api"
    container_name: votingonideas-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  sqlserver_data:
